<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-section {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-control {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #4CAF50;
            outline: none;
            box-shadow: 0 0 5px rgba(76,175,80,0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #43a047;
        }
    </style>
</head>

<body>
    
<section class="form-section">
    <h2>Add Transaction</h2>

    <form id="transaction-form">
        
        <div class="form-control">
            <label for="type">Type</label>
            <select id="type" required>
                <option value="">Select</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="form-control">
            <label for="description">Description</label>
            <input 
                type="text" 
                id="description" 
                placeholder="e.g. Salary, Food, Rent" 
                required
            >
        </div>

        <div class="form-control">
            <label for="amount">Amount</label>
            <input 
                type="number" 
                id="amount" 
                placeholder="Enter amount" 
                required
            >
        </div>

        <div class="form-control">
            <label for="date">Date</label>
            <input type="date" id="date" required>
        </div>

        <button type="submit" class="btn">
            Add Transaction
        </button>

    </form>
</section>

</body>
</html>
